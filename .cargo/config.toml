[unstable]
bindeps = true

[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "force-frame-pointers=on"
]

[target.x86_64-unknown-none]
rustflags = [
  "-C", "force-frame-pointers=on",
  "-C", "code-model=large",
  "-C", "relocation-model=static",
  # "-C", "target-feature=+crt-static",
]
runner = "cargo run -p vmm --"
